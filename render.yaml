# render.yaml — GravityFlow Deployment Configuration
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── BullMQ Worker (Background Service) ──────────────────────────────────────
  - type: worker
    name: gravityflow-worker
    runtime: node
    plan: free
    rootDir: worker
    buildCommand: npm ci && npx tsc --outDir dist
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: AGENT_NEXTJS_API_URL
        sync: false
      - key: AGENT_API_KEY
        sync: false

  # ── Python Autonomous Agent (Background Service) ─────────────────────────────
  - type: worker
    name: gravityflow-agent
    runtime: python
    plan: free
    rootDir: agent
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py --daemon
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: AGENT_NEXTJS_API_URL
        sync: false
      - key: AGENT_API_KEY
        sync: false
      - key: CREATION_INTERVAL_HOURS
        value: "6"
